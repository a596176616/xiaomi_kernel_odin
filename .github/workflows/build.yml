name: Build Xiaomi Odin Kernel Pure Final
on:
  workflow_dispatch:

env:
  OUT_DIR: "${{ github.workspace }}/out"

jobs:
  Build-Kernel:
    runs-on: ubuntu-22.04
    env:
      # 强制启用Node24，彻底消除Node.js20废弃警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      WORKSPACE: ${{ github.workspace }}
      KERNEL_REPO: https://github.com/a596176616/xiaomi_kernel_odin.git
      KERNEL_BRANCH: main
      KERNEL_NAME: xiaomi_odin
      KERNEL_DEVICE: odin
      DEFCONFIG: odin_defconfig

      # 已关闭 KernelSU
      WITH_KERNELSU: false
      # 开启 SukiSU Ultra 集成
      WITH_SUKISU: true

      USE_ANYKERNEL3: true
      ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git
      ANYKERNEL_BRANCH: master

      ARCH: arm64

    steps:
      # 1. 安装全部编译依赖
      - name: Install All Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip unzip libssl-dev libelf-dev flex bison zstd wget python3 \
          clang llvm lld gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # 2. 克隆内核源码
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --shallow-submodules -j$(nproc) --branch ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} ${{ env.KERNEL_NAME }}

      # 3. 克隆AnyKernel3
      - name: Clone AnyKernel3
        if: ${{ env.USE_ANYKERNEL3 == true }}
        run: |
          git clone --depth=1 --branch ${{ env.ANYKERNEL_BRANCH }} ${{ env.ANYKERNEL_REPO }} AnyKernel3

      # 4. 集成 SukiSU Ultra（官方标准脚本）
      - name: Integrate SukiSU Ultra
        if: ${{ env.WITH_SUKISU == true }}
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          # 清理旧残留 KernelSU 全部文件
          rm -rf KernelSU drivers/kernelsu
          # SukiSU Ultra 官方一键拉取集成脚本
          curl -LSs https://raw.githubusercontent.com/SuikuLab/SukiSU/main/kernel/setup.sh | bash

      # 5. 生成设备配置
      - name: Generate Default Defconfig
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make O=${{ env.OUT_DIR }} ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 ${{ env.DEFCONFIG }}

      # 6. 安卓16/17兼容配置修复
      - name: Android 16 17 Compatible Patch
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          sed -i 's/^# CONFIG_RSEQ is not set/CONFIG_RSEQ=n/' ${{ env.OUT_DIR }}/.config
          sed -i 's/^CONFIG_DMI=y/# CONFIG_DMI is not set/' ${{ env.OUT_DIR }}/.config
          sed -i 's/^CONFIG_FHANDLE=y/# CONFIG_FHANDLE is not set/' ${{ env.OUT_DIR }}/.config

          sed -i 's/^# CONFIG_ANDROID_BINDERFS is not set/CONFIG_ANDROID_BINDERFS=y/' ${{ env.OUT_DIR }}/.config
          sed -i 's/^# CONFIG_INIT_ON_ALLOC_DEFAULT_ON is not set/CONFIG_INIT_ON_ALLOC_DEFAULT_ON=y/' ${{ env.OUT_DIR }}/.config
          sed -i 's/^# CONFIG_RCU_TASKS is not set/CONFIG_RCU_TASKS=y/' ${{ env.OUT_DIR }}/.config
          sed -i 's/^# CONFIG_MEMCG_SWAP is not set/CONFIG_MEMCG_SWAP=y/' ${{ env.OUT_DIR }}/.config

          make O=${{ env.OUT_DIR }} ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 olddefconfig

      # 7. 编译内核
      - name: Compile Kernel
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make O=${{ env.OUT_DIR }} ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 -j$(nproc) 2>&1 | tee build.log

      # 调试：列出所有编译产物，看真实输出文件
      - name: List All Kernel Output Files
        run: |
          echo "===== 内核编译输出全部文件 ====="
          ls -la ${{ env.OUT_DIR }}/arch/arm64/boot/
          echo "================================"

      # 8. 上传编译日志
      - name: Upload Build Log
        uses: actions/upload-artifact@v4.6.0
        with:
          name: BuildLog-odin
          path: ${{ env.KERNEL_NAME }}/build.log
          retention-days: 7

      # 9. 上传全部内核镜像（小米Lahaina 骁龙8+真实输出）
      - name: Upload Kernel Images
        uses: actions/upload-artifact@v4.6.0
        with:
          name: Kernel-Images-odin
          path: |
            ${{ env.OUT_DIR }}/arch/arm64/boot/Image
            ${{ env.OUT_DIR }}/arch/arm64/boot/Image.lz4
            ${{ env.OUT_DIR }}/arch/arm64/boot/dtb.img
            ${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz
          retention-days: 7

      # 10. 标准AnyKernel3打包（odin专用修复版，解决文件不生成问题）
      - name: Pack AnyKernel3 Flashable Zip
        run: |
          # 复制内核镜像，增加容错，不存在则提示
          cp -fv ${{ env.OUT_DIR }}/arch/arm64/boot/Image AnyKernel3/ || echo "Image 文件未找到！"
          cp -fv ${{ env.OUT_DIR }}/arch/arm64/boot/dtb.img AnyKernel3/ || echo "dtb.img 文件未找到！"

          # 进入AK3目录打包，排除所有git隐藏文件，修复原zip命令bug
          cd AnyKernel3
          zip -r odin-final-kernel.zip ./* -x "*.git*"
          
          # 返回上级，完整打包整个AnyKernel3文件夹
          cd ..
          zip -r odin-kernel.zip AnyKernel3/

      # 新增调试：打包完列出所有文件，方便你排查
      - name: List All Zip Files
        run: |
          echo "===== 所有生成压缩包 ====="
          ls -la *.zip
          ls -la AnyKernel3/*.zip
          echo "=========================="

      # 11. 上传最终卡刷包1
      - name: Upload Final Flash Zip 1
        uses: actions/upload-artifact@v4.6.0
        with:
          name: odin-final-kernel
          path: AnyKernel3/odin-final-kernel.zip
          retention-days: 7

      # 12. 上传最终卡刷包2
      - name: Upload Final Flash Zip 2
        uses: actions/upload-artifact@v4.6.0
        with:
          name: odin-kernel
          path: odin-kernel.zip
          retention-days: 7
