name: 小米MIX4(odin) Android14 内核编译
on:
  # 推送代码到main分支时自动触发编译（可注释关闭）
  push:
    branches: [ "main" ]
  # 支持手动在Actions页面触发编译（核心推荐）
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 1. 拉取内核源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 安装系统编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libncurses-dev \
            zip curl wget python3 python3-pip cpio rsync git lz4 \
            gzip unzip zstd libelf-dev dwarves kmod

      - name: 3. 拉取安卓官方内核编译构建脚本
        run: |
          git clone --depth=1 -b android14-5.15 https://android.googlesource.com/kernel/build ./build
          # 赋予脚本执行权限
          chmod +x ./build/build.sh
          chmod +x ./build.sh

      - name: 4. 配置工具链缓存（加速后续编译）
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/kernel-toolchain
            ./out
          key: ${{ runner.os }}-kernel-odin-android14-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-odin-android14-

      - name: 5. 编译内核（适配lahaina平台/骁龙888）
        run: |
          # 指定编译配置文件（仓库自带的MIX4专属配置）
          export BUILD_CONFIG=./build.config.msm.lahaina
          # 执行编译，使用runner全核心并行编译
          ./build/build.sh -j$(nproc)
          # 列出编译产物，确认核心文件生成
          echo "===== 编译产物列表 ====="
          ls -la ./out/arch/arm64/boot/
          ls -la ./out/dist/

      - name: 6. 拉取AnyKernel3 打包可刷入卡刷包
        run: |
          # 拉取官方AnyKernel3源码
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ./AnyKernel3
          
          # 复制编译好的内核核心文件到打包目录
          cp ./out/arch/arm64/boot/Image.gz ./AnyKernel3/
          cp ./out/arch/arm64/boot/dtbo.img ./AnyKernel3/
          cp ./out/arch/arm64/boot/dts/qcom/*.dtb ./AnyKernel3/dtb/
          
          # 适配小米MIX4(odin)的AnyKernel3配置
          cat > ./AnyKernel3/anykernel.sh << 'EOF'
# AnyKernel3 适配配置 小米MIX4(odin)
do.devicecheck=1
do.modules=1
do.systemless=1
do.cleanup=1
do.cleanuponabort=0
device.name1=odin
device.name2=MIX4
device.name3=XiaoMiMIX4
block=/dev/block/by-name/boot
is_slot_device=1
ramdisk_compression=auto
patch_vbmeta_flag=auto

# 导入通用函数
. tools/ak3-core.sh

# 内核刷入逻辑
split_boot
dump_boot
write_boot
EOF
          
          # 复制编译好的内核模块到打包目录
          mkdir -p ./AnyKernel3/modules/vendor/lib/modules/
          find ./out/ -name "*.ko" -type f -exec cp {} ./AnyKernel3/modules/vendor/lib/modules/ \;
          
          # 打包成卡刷zip包
          cd ./AnyKernel3
          zip -r9 ../MIX4-Android14-Test-Kernel-${{ github.sha }}.zip *
          cd ../
          
          # 确认打包完成
          echo "===== 卡刷包生成完成 ====="
          ls -la *.zip

      - name: 7. 上传编译制品到Actions
        uses: actions/upload-artifact@v4
        with:
          name: MIX4-Android14-Test-Kernel
          path: ./*.zip
          retention-days: 30 # 制品保留30天
