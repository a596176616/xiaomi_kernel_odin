name: 小米MIX4(odin) Android14 内核编译
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 1. 拉取内核源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. 安装编译依赖（包含完整 LLVM 工具链）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libncurses-dev \
            zip curl wget python3 python3-pip cpio rsync git lz4 \
            gzip unzip zstd libelf-dev dwarves kmod clang lld llvm

      - name: 3. 编译内核
        run: |
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          # ⚠️ 请确认仓库中存在 odin_defconfig，否则替换为实际存在的文件名
          make O=out odin_defconfig
          make O=out -j$(nproc)
          echo "===== 编译产物列表 ====="
          ls -la ./out/arch/arm64/boot/
          ls -la ./out/

      - name: 4. 拉取 AnyKernel3 打包
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ./AnyKernel3
          
          # 复制内核镜像（根据实际产物选择 Image 或 Image.gz）
          if [ -f ./out/arch/arm64/boot/Image.gz ]; then
            cp ./out/arch/arm64/boot/Image.gz ./AnyKernel3/
          else
            cp ./out/arch/arm64/boot/Image ./AnyKernel3/
          fi

          # 复制 dtbo（如果存在）
          [ -f ./out/arch/arm64/boot/dtbo.img ] && cp ./out/arch/arm64/boot/dtbo.img ./AnyKernel3/ || echo "无 dtbo.img，跳过"

          # 递归复制所有设备树文件
          find ./out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} ./AnyKernel3/dtb/ \;

          # 创建 MIX4 专属刷入脚本（使用 printf 避免 heredoc 语法冲突）
          printf '%s\n' \
            'do.devicecheck=1' \
            'do.modules=1' \
            'do.systemless=1' \
            'do.cleanup=1' \
            'do.cleanuponabort=0' \
            'device.name1=odin' \
            'device.name2=MIX4' \
            'device.name3=小米MIX4' \
            'block=/dev/block/by-name/boot' \
            'is_slot_device=1' \
            'ramdisk_compression=auto' \
            'patch_vbmeta_flag=auto' \
            '. tools/ak3-core.sh' \
            'split_boot' \
            'dump_boot' \
            'write_boot' \
            > ./AnyKernel3/anykernel.sh

          # 复制内核模块（.ko 文件）
          mkdir -p ./AnyKernel3/modules/vendor/lib/modules/
          find ./out/ -name "*.ko" -type f -exec cp {} ./AnyKernel3/modules/vendor/lib/modules/ \; 2>/dev/null || true

          # 打包为卡刷 ZIP
          cd ./AnyKernel3
          zip -r9 ../MIX4-Android14-Test-Kernel-${{ github.sha }}.zip *
          cd ../
          echo "===== 卡刷包生成完成 ====="
          ls -la *.zip

      - name: 5. 上传编译制品
        uses: actions/upload-artifact@v4
        with:
          name: MIX4-Android14-Test-Kernel
          path: ./*.zip
          retention-days: 30