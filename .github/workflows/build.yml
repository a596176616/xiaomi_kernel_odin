name: Build Xiaomi Odin Kernel Pure Final
on:
  workflow_dispatch:

env:
  OUT_DIR: "${{ github.workspace }}/out"

jobs:
  Build-Kernel:
    runs-on: ubuntu-22.04
    env:
      # 强制启用Node24，彻底消除Node.js20废弃警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      WORKSPACE: ${{ github.workspace }}
      KERNEL_REPO: https://github.com/a596176616/xiaomi_kernel_odin.git
      KERNEL_BRANCH: main
      KERNEL_NAME: xiaomi_odin
      KERNEL_DEVICE: odin
      DEFCONFIG: odin_defconfig

      # 已关闭 KernelSU
      WITH_KERNELSU: false
      # 开启 SukiSU Ultra 集成
      WITH_SUKISU: true

      USE_ANYKERNEL3: true
      ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git
      ANYKERNEL_BRANCH: master

      ARCH: arm64

    steps:
      # 1. 安装全部编译依赖
      - name: Install All Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential bc curl git zip unzip \
            libssl-dev libelf-dev flex bison zstd wget python3 \
            clang llvm lld gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # 2. 克隆内核源码
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --shallow-submodules -j$(nproc) --branch ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} ${{ env.KERNEL_NAME }}

      # 3. 克隆AnyKernel3
      - name: Clone AnyKernel3
        if: ${{ env.USE_ANYKERNEL3 == true }}
        run: |
          git clone --depth=1 --branch ${{ env.ANYKERNEL_BRANCH }} ${{ env.ANYKERNEL_REPO }} AnyKernel3

      # 4. 集成 SukiSU Ultra（官方标准脚本）
      - name: Integrate SukiSU Ultra
        if: ${{ env.WITH_SUKISU == true }}
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          # 清理旧残留 KernelSU 全部文件
          rm -rf KernelSU drivers/kernelsu
          # SukiSU Ultra 官方一键拉取集成脚本
          curl -LSs https://raw.githubusercontent.com/SuikuLab/SukiSU/main/kernel/setup.sh | bash

      # 5. 生成设备配置
      - name: Generate Default Defconfig
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make O=${{ env.OUT_DIR }} ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 ${{ env.DEFCONFIG }}

      # 6. 安卓16/17兼容配置修复
      - name: Android 16 17 Compatible Patch
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          CONFIG_FILE=${{ env.OUT_DIR }}/.config
          
          # 禁用的选项
          sed -i 's/^# CONFIG_RSEQ is not set/CONFIG_RSEQ=n/' "$CONFIG_FILE"
          sed -i 's/^CONFIG_DMI=y/# CONFIG_DMI is not set/' "$CONFIG_FILE"
          sed -i 's/^CONFIG_FHANDLE=y/# CONFIG_FHANDLE is not set/' "$CONFIG_FILE"
          
          # 启用的选项
          sed -i 's/^# CONFIG_ANDROID_BINDERFS is not set/CONFIG_ANDROID_BINDERFS=y/' "$CONFIG_FILE"
          sed -i 's/^# CONFIG_INIT_ON_ALLOC_DEFAULT_ON is not set/CONFIG_INIT_ON_ALLOC_DEFAULT_ON=y/' "$CONFIG_FILE"
          sed -i 's/^# CONFIG_RCU_TASKS is not set/CONFIG_RCU_TASKS=y/' "$CONFIG_FILE"
          sed -i 's/^# CONFIG_MEMCG_SWAP is not set/CONFIG_MEMCG_SWAP=y/' "$CONFIG_FILE"
          
          make O=${{ env.OUT_DIR }} ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 olddefconfig

      # 7. 编译内核
      - name: Compile Kernel
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          set -e
          make O=${{ env.OUT_DIR }} ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 -j$(nproc) 2>&1 | tee build.log

      # 8. 验证编译产物
      - name: Verify Kernel Build Success
        if: ${{ env.USE_ANYKERNEL3 == true }}
        run: |
          echo "🔍 检查内核编译产物..."
          [ -f "${{ env.OUT_DIR }}/arch/arm64/boot/Image" ] && echo "✅ Image found" || { echo "❌ Image not found"; exit 1; }
          [ -f "${{ env.OUT_DIR }}/arch/arm64/boot/dtb.img" ] && echo "✅ dtb.img found" || { echo "❌ dtb.img not found"; exit 1; }
          echo "✅ 所有编译产物检查通过"

      # 9. 列出编译产物
      - name: List Kernel Output Files
        if: always()
        run: |
          echo "===== 内核编译输出文件 ====="
          ls -lah ${{ env.OUT_DIR }}/arch/arm64/boot/ 2>/dev/null || echo "输出目录不存在"
          echo "================================"

      # 10. 上传编译日志
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: BuildLog-odin
          path: ${{ env.KERNEL_NAME }}/build.log
          retention-days: 7

      # 11. 上传内核镜像
      - name: Upload Kernel Images
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: Kernel-Images-odin
          path: ${{ env.OUT_DIR }}/arch/arm64/boot/
          retention-days: 7

      # 12. 标准AnyKernel3打包
      - name: Pack AnyKernel3 Flashable Zip
        if: ${{ env.USE_ANYKERNEL3 == true }}
        run: |
          set -e
          echo "📦 打包 AnyKernel3..."
          
          # 复制内核镜像，检查文件是否存在
          [ -f "${{ env.OUT_DIR }}/arch/arm64/boot/Image" ] || { echo "❌ Image 文件未找到！"; exit 1; }
          [ -f "${{ env.OUT_DIR }}/arch/arm64/boot/dtb.img" ] || { echo "❌ dtb.img 文件未找到！"; exit 1; }
          
          cp -fv "${{ env.OUT_DIR }}/arch/arm64/boot/Image" AnyKernel3/ 
          cp -fv "${{ env.OUT_DIR }}/arch/arm64/boot/dtb.img" AnyKernel3/
          
          # 进入AK3目录打包，修复排除参数错误
          cd AnyKernel3
          zip -r odin-final-kernel.zip ./* -x "*.git*" .gitignore || { echo "❌ 打包失败！"; exit 1; }
          cd ..
          
          # 根目录完整打包AnyKernel3
          zip -r odin-kernel.zip AnyKernel3/ -x "*.git*" .gitignore || { echo "❌ 打包失败！"; exit 1; }
          
          echo "✅ 打包完成"

      # 13. 列出生成的压缩包
      - name: List Generated Zip Files
        if: ${{ env.USE_ANYKERNEL3 == true }}
        run: |
          echo "===== 所有生成的压缩包 ====="
          ls -lah *.zip 2>/dev/null || echo "根目录无zip文件"
          ls -lah AnyKernel3/*.zip 2>/dev/null || echo "AnyKernel3目录无zip文件"
          echo "=========================="

      # 14. 上传最终卡刷包1
      - name: Upload Final Flash Zip 1
        if: ${{ env.USE_ANYKERNEL3 == true }}
        uses: actions/upload-artifact@v4.6.0
        with:
          name: odin-final-kernel
          path: AnyKernel3/odin-final-kernel.zip
          retention-days: 7

      # 15. 上传最终卡刷包2
      - name: Upload Final Flash Zip 2
        if: ${{ env.USE_ANYKERNEL3 == true }}
        uses: actions/upload-artifact@v4.6.0
        with:
          name: odin-kernel
          path: odin-kernel.zip
          retention-days: 7

      # 16. 生成编译摘要
      - name: Generate Build Summary
        if: always()
        run: |
          {
            echo "## 🔨 内核编译摘要"
            echo ""
            echo "| 项目 | 详情 |"
            echo "|------|------|"
            echo "| 内核名称 | ${{ env.KERNEL_NAME }} |"
            echo "| 设备 | ${{ env.KERNEL_DEVICE }} |"
            echo "| 架构 | ${{ env.ARCH }} |"
            echo "| SukiSU | ${{ env.WITH_SUKISU }} |"
            echo "| AnyKernel3 | ${{ env.USE_ANYKERNEL3 }} |"
            echo "| 编译时间 | $(date '+%Y-%m-%d %H:%M:%S') |"
          } >> $GITHUB_STEP_SUMMARY
